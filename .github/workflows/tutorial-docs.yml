name: Deploy Tutorial Docs

on:
  push:
    branches: [master]
    paths:
      - 'tutorial/**'
      - 'mkdocs.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin jieba

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
